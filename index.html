<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Online - Mariscos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-marino: #1a3a5f;
            --azul-claro: #0077b6;
            --dorado: #c5a059;
            --blanco: #ffffff;
            --gris-claro: #f4f7f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--azul-marino) 0%, #001219 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background-color: var(--blanco);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-area h2 {
            color: var(--azul-marino);
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-area p {
            color: var(--dorado);
            font-size: 0.9em;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 5px;
            color: #666;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--azul-claro);
            outline: none;
            box-shadow: 0 0 8px rgba(0, 119, 182, 0.2);
        }

        .costo-info {
            background-color: #e7f3f9;
            color: var(--azul-marino);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid var(--azul-claro);
        }

        .aviso-privacidad {
            font-size: 0.75em;
            color: #888;
            margin: 20px 0;
            line-height: 1.4;
        }

        button {
            width: 100%;
            background-color: var(--azul-marino);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: var(--azul-claro);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .success-msg {
            display: none;
            color: #2d6a4f;
            background: #d8f3dc;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <h2>Mariscos</h2>
            <p>Reservas Marinas</p>
        </div>

        <div id="mensajeExito" class="success-msg">¡Reserva enviada con éxito!</div>

        <div class="costo-info">
            Costo de reserva: $10.00 USD por persona
        </div>

        <form id="reservaForm">
            <div class="form-group">
                <label for="cliente">Nombre del Cliente</label>
                <input type="text" id="cliente" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono de contacto</label>
                <input type="tel" id="telefono" placeholder="2291234567" required>
            </div>

            <div class="form-group">
                <label for="personas">Número de personas</label>
                <input type="number" id="personas" min="1" max="20" placeholder="¿Cuántos vienen?" required>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha y Hora</label>
                <input type="datetime-local" id="fecha" required>
            </div>

            <div class="form-group">
                <label for="metodo_pago">Método de pago preferido</label>
                <select id="metodo_pago" required>
                    <option value="Efectivo">Efectivo (En sucursal)</option>
                    <option value="Tarjeta">Tarjeta de Crédito/Débito</option>
                </select>
            </div>
            
            <p class="aviso-privacidad">
                Al confirmar, aceptas que tus datos sean tratados conforme a nuestro 
                <strong>Aviso de Privacidad</strong> bajo la LFPDPPP de México.
            </p> 
            
            <button type="submit" id="btnEnviar">Confirmar Reserva</button>
        </form>
    </div>

    <script>
        document.getElementById('reservaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const msg = document.getElementById('mensajeExito');

            btn.innerText = "Enviando...";
            btn.disabled = true;

            const datos = {
                cliente: document.getElementById('cliente').value,
                telefono: document.getElementById('telefono').value,
                personas: parseInt(document.getElementById('personas').value),
                fecha: document.getElementById('fecha').value,
                metodo_pago: document.getElementById('metodo_pago').value,
                estado: "Pendiente"
            };

            try {
                const response = await fetch('https://sistema-de-reservas-w1p9.onrender.com/reservar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    msg.style.display = "block";
                    document.getElementById('reservaForm').reset();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert("Hubo un error en el servidor. Intenta de nuevo.");
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor de Mariscos.");
            } finally {
                btn.innerText = "Confirmar Reserva";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
